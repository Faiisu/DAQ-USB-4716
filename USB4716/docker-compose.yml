# docker-compose.yml
# See: docs/architecture/context.md
# English comments only

version: '3.8'

services:
  daq-control:
    build: .
    container_name: daq_control_center
    ports:
      - "8081:8081"
    volumes:
      - .:/app
    environment:
      - PYTHONUNBUFFERED=1
    
    # ── Linux Host USB Passthrough Configuration ──────────────────────────────
    # Un-comment the sections below on Linux hosts if running stream_to_db.py
    # using real USB-4716 hardware.
    #
    # privileged: true
    # devices:
    #   - "/dev/bus/usb:/dev/bus/usb"
    
    restart: unless-stopped

services:
  timescaledb:
    image: timescale/timescaledb:latest-pg16
    container_name: daq_tsdb
    restart: unless-stopped
    environment:
      POSTGRES_USER:     admin
      POSTGRES_PASSWORD: admin
      POSTGRES_DB:       daq_db
    ports:
      - "5432:5432"
    volumes:
      - ./pgdata:/var/lib/postgresql/data
      - ./db_setup.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - daq-net

networks:
  daq-net:
    name: daq-net
    driver: bridge

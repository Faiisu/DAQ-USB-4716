services:
  timescaledb:
    image: timescale/timescaledb:latest-pg16
    container_name: daq_tsdb
    restart: unless-stopped
    environment:
      POSTGRES_USER:     admin
      POSTGRES_PASSWORD: admin
      POSTGRES_DB:       daq_db
    ports:
      - "5432:5432"
    volumes:
      - ./pgdata:/var/lib/postgresql/data
      - ./db_setup.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - daq-net

  webgui:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: daq_webgui
    restart: unless-stopped
    ports:
      - "5050:5050"
    environment:
      - RUNNING_IN_DOCKER=true
      - GUI_HOST=daq_webgui
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./config.py:/app/config.py
    depends_on:
      - timescaledb
    networks:
      - daq-net

networks:
  daq-net:
    name: daq-net
    driver: bridge

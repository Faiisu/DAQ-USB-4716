<!-- ── Top Header ── -->
<header class="top-header">
  <div class="header-left">
    <div class="header-title" id="header-title">DASHBOARD</div>
    <div class="header-breadcrumb">
      <span>DAQ USB-4716</span>
      <span>›</span>
      <span id="breadcrumb-sub">Overview</span>
    </div>
  </div>
  <div class="header-actions">
    <!-- Pipeline status chip -->
    <div class="pipeline-chip" id="pipeline-chip">
      <div class="chip-dot" id="chip-dot"></div>
      <span id="chip-label">STOPPED</span>
    </div>
    <button class="btn btn-primary" id="btn-start-real" onclick="startPipeline('real')" aria-label="Start real DAQ pipeline">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/>
      </svg>
      Start Real DAQ
    </button>
    <button class="btn btn-success" id="btn-start-mockup" onclick="startPipeline('mockup')" aria-label="Start mockup pipeline">
      <svg viewBox="0 0 24 24" fill="currentColor" stroke="none"><polygon points="5 3 19 12 5 21 5 3"/></svg>
      Start Mockup
    </button>
    <button class="btn btn-danger" id="btn-stop" onclick="stopPipeline()" disabled aria-label="Stop pipeline">
      <svg viewBox="0 0 24 24" fill="currentColor" stroke="none"><rect x="6" y="6" width="12" height="12"/></svg>
      Stop
    </button>
  </div>
</header>

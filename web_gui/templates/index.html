<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>DAQ USB-4716 · Control Center</title>
  <meta name="description" content="Real-time data acquisition control center for the DAQ USB-4716 TimescaleDB pipeline"/>

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet"/>

  <!-- Chart.js -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.3/dist/chart.umd.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chartjs-adapter-date-fns@3.0.0/dist/chartjs-adapter-date-fns.bundle.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-zoom@2.0.1/dist/chartjs-plugin-zoom.min.js"></script>

  <!-- Socket.IO -->
  <script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>

  <!-- Styles -->
  <link rel="stylesheet" href="/static/style.css"/>
</head>
<body>

<!-- Scan overlay (subtle CRT lines for depth) -->
<div class="scan-overlay" aria-hidden="true"></div>

<!-- Sidebar Component -->
{% include 'components/sidebar.html' %}

<!-- Main Layout Wrapper -->
<main class="main" role="main">

  <!-- Header Component -->
  {% include 'components/header.html' %}

  <!-- Scrollable Viewport Content -->
  <div class="content-scroll">

    <!-- Individual Tab Panel Views -->
    {% include 'tabs/dashboard.html' %}
    {% include 'tabs/plotter.html' %}
    {% include 'tabs/daq_config.html' %}
    {% include 'tabs/db_config.html' %}
    {% include 'tabs/waveforms.html' %}
    {% include 'tabs/logs.html' %}

  </div><!-- /content-scroll -->
</main>

<!-- Modular ES6 Application Entrypoint -->
<script type="module" src="/static/js/app.js"></script>
</body>
</html>

<!-- ════════════════ TAB: MOCKUP WAVEFORMS ════════════════ -->
<section class="tab-panel" id="tab-mockup" aria-label="Mockup Waveform Configuration">

  <div class="card">
    <div class="card-header">
      <div class="card-title">
        <span class="icon-dot" style="background:var(--pink)"></span>
        Synthetic Waveform Generator
      </div>
    </div>
    <div class="card-body">

      <div class="alert info" style="margin-bottom:18px;">
        <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
        Each channel generates: <strong>A × sin(2π·f·t) + DC + N(0, σ)</strong> — clamped to 0–5 V range
      </div>

      <div class="form-group" style="max-width:220px; margin-bottom:20px;">
        <label for="inp-noise">Gaussian Noise σ (V)</label>
        <input class="form-control" id="inp-noise" type="number" step="0.001" min="0" max="1"/>
      </div>

      <div class="waveform-list" id="waveform-list"></div>

      <div class="form-actions mt-4">
        <button class="btn btn-primary" onclick="saveMockupConfig()">
          <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/></svg>
          Save Waveforms
        </button>
      </div>
      <div class="alert hidden mt-3" id="mockup-save-result"></div>

    </div>
  </div>

</section>

<!-- ════════════════ TAB: DATA PLOTTER ════════════════ -->
<section class="tab-panel" id="tab-plotter" aria-label="Data Plotter">

  <!-- Plotter Controls -->
  <div class="card">
    <div class="card-header">
      <div class="card-title">
        <span class="icon-dot"></span>
        Plotter Configuration
      </div>
      <!-- Mode Toggle Radio Group -->
      <div style="display: flex; gap: 16px; align-items: center;">
        <label style="display: flex; align-items: center; gap: 6px; font-size: 11px; cursor: pointer; color: var(--text-sub);">
          <input type="radio" name="plot-mode" value="live" checked onclick="togglePlotMode('live')"/>
          <span>Live Session (DB Polling)</span>
        </label>
        <label style="display: flex; align-items: center; gap: 6px; font-size: 11px; cursor: pointer; color: var(--text-sub);">
          <input type="radio" name="plot-mode" value="history" onclick="togglePlotMode('history')"/>
          <span>Static Query</span>
        </label>
      </div>
    </div>
    <div class="card-body">

      <!-- Global Database Source Selector -->
      <div class="form-section" style="margin-bottom: 16px;">
        <div class="form-section-title">Database Source</div>
        <div class="form-row">
          <div class="form-group" style="max-width: 280px;">
            <label for="plot-db-target">Database Target</label>
            <select class="form-control" id="plot-db-target" onchange="onDbTargetChange()">
              <option value="real">Real Database (DB_DSN)</option>
              <option value="mockup" selected>Mockup Database (MOCKUP_DB_DSN)</option>
              <option value="custom">Custom DSN Override...</option>
            </select>
          </div>
          <div class="form-group hidden" id="custom-dsn-group" style="flex: 1;">
            <label for="plot-dsn-override">Custom DSN String</label>
            <input class="form-control mono" id="plot-dsn-override" type="text" placeholder="postgresql://user:pass@host:port/dbname"/>
          </div>
        </div>
      </div>

      <!-- Section 1: Live Controls -->
      <div id="plot-controls-live">
        <div class="form-section">
          <div class="form-section-title">Live Session Configuration</div>
          <div class="form-row">
            <div class="form-group" style="max-width: 160px;">
              <label for="live-window">Window Size</label>
              <div style="display: flex; align-items: center; gap: 8px;">
                <input class="form-control" id="live-window" type="number" value="15" min="5" max="120" style="width: 80px;"/>
                <span style="font-size: 11px; color: var(--text-muted);">seconds</span>
              </div>
            </div>
            <div class="form-group">
              <label for="live-channels">Channels <span class="tag">comma-separated</span></label>
              <input class="form-control mono" id="live-channels" type="text" placeholder="0,1,2  or blank = all"/>
            </div>
          </div>
        </div>

        <div class="form-actions">
          <button class="btn btn-primary" id="btn-toggle-poll" onclick="toggleLiveSession()">
            <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2"><polygon points="5 3 19 12 5 21 5 3"/></svg>
            Start Live Session
          </button>
          <button class="btn btn-ghost" onclick="clearLiveChart()">
            <svg viewBox="0 0 24 24" width="12" height="12" fill="none" stroke="currentColor" stroke-width="2"><polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 1 0 .49-3.7"/></svg>
            Clear Graph
          </button>
        </div>
        <div class="alert hidden mt-3" id="live-session-msg"></div>
      </div>

      <!-- Section 2: Historical Controls (hidden by default) -->
      <div id="plot-controls-history" class="hidden">
        <div class="form-section">
          <div class="form-section-title">Query Parameters</div>
          <div class="form-row">
            <div class="form-group">
              <label for="static-channels">Channels <span class="tag">comma-separated</span></label>
              <input class="form-control mono" id="static-channels" type="text" placeholder="0,1,2  or blank = all"/>
            </div>
            <div class="form-group">
              <label for="static-last">Last N seconds</label>
              <input class="form-control" id="static-last" type="number" value="60" min="1" placeholder="60"/>
            </div>
          </div>
        </div>

        <div class="form-section">
          <div class="form-section-title">Time Range Override <span class="tag">optional</span></div>
          <div class="form-row">
            <div class="form-group">
              <label for="static-start">Start Time</label>
              <input class="form-control" id="static-start" type="datetime-local"/>
            </div>
            <div class="form-group">
              <label for="static-end">End Time</label>
              <input class="form-control" id="static-end" type="datetime-local"/>
            </div>
          </div>
        </div>

        <div class="form-actions">
          <button class="btn btn-primary" id="btn-query" onclick="runStaticPlot()">
            <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
            Query &amp; Plot
          </button>
          <button class="btn btn-ghost" onclick="fetchChannels()">
            <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 11a9 9 0 0 1 9 9"/><path d="M4 4a16 16 0 0 1 16 16"/><circle cx="5" cy="19" r="1"/></svg>
            Fetch Channels
          </button>
        </div>

        <div class="alert hidden mt-3" id="static-result-msg"></div>
      </div>

    </div>
  </div>

  <!-- Chart Display -->
  <div class="card" style="flex:1;">
    <div class="card-header">
      <div class="card-title">
        <span class="icon-dot" id="plot-chart-dot" style="animation:pulse-glow 2s infinite"></span>
        Waveform Graph
      </div>
      <div class="card-actions">
        <span class="tag" id="static-time-range"></span>
        <button class="btn btn-ghost btn-sm" onclick="resetPlotZoom()" style="padding: 4px 8px;" title="Reset zoom/pan to default">
          <svg viewBox="0 0 24 24" width="12" height="12" fill="none" stroke="currentColor" stroke-width="2"><path d="M15 3h6v6M9 21H3v-6M21 3l-7 7M3 21l7-7"/></svg>
          Reset Zoom
        </button>
      </div>
    </div>
    <div class="card-body" style="padding:16px; position:relative;">
      <div class="chart-wrapper">
        <canvas id="plot-chart" aria-label="Voltage plotter chart"></canvas>
        <div class="chart-empty" id="plot-empty">
          <span class="empty-icon">📡</span>
          <span id="plot-empty-text">Start the pipeline to see live data</span>
        </div>
      </div>
    </div>
  </div>

</section>

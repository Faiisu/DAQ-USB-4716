<!-- ════════════════ TAB: LOG CONSOLE ════════════════ -->
<section class="tab-panel log-panel" id="tab-log" aria-label="Log Console">

  <div class="card" style="flex:1; display:flex; flex-direction:column; height:calc(100vh - var(--header-h) - 40px);">
    <div class="card-header">
      <div class="card-title">
        <span class="icon-dot" style="background:var(--green)"></span>
        Log Console
      </div>
      <div class="card-actions">
        <span class="tag" id="log-count">0 lines</span>
        <button class="btn btn-ghost btn-sm" onclick="clearLog()">
          <svg viewBox="0 0 24 24" width="12" height="12" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6"/><path d="M10 11v6M14 11v6"/></svg>
          Clear
        </button>
      </div>
    </div>
    <div class="log-output" id="log-output" role="log" aria-live="polite" aria-label="Pipeline log output"></div>
  </div>

</section>

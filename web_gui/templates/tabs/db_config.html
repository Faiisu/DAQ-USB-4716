<!-- ════════════════ TAB: DATABASE ════════════════ -->
<section class="tab-panel" id="tab-db" aria-label="Database Configuration">

  <div class="card">
    <div class="card-header">
      <div class="card-title">
        <span class="icon-dot" style="background:var(--violet)"></span>
        Connection Settings
      </div>
    </div>
    <div class="card-body">

      <div class="form-section">
        <div class="form-section-title">DSN Configuration</div>
        <div class="form-group" style="margin-bottom:14px;">
          <label for="inp-db-dsn">Production DB DSN</label>
          <input class="form-control mono" id="inp-db-dsn" type="text" placeholder="postgresql://user:pass@host:5432/daq_db"/>
          <span class="form-hint">Used by <code>stream_to_db.py</code> with real hardware</span>
        </div>
        <div class="form-group">
          <label for="inp-mockup-dsn">Mockup DB DSN</label>
          <input class="form-control mono" id="inp-mockup-dsn" type="text" placeholder="postgresql://user:pass@localhost:5432/daq_db"/>
          <span class="form-hint">Used by the web GUI mockup pipeline</span>
        </div>
      </div>

      <div class="form-section">
        <div class="form-section-title">Performance</div>
        <div class="form-row">
          <div class="form-group">
            <label for="inp-page-size">DB Page Size (rows/insert)</label>
            <input class="form-control" id="inp-page-size" type="number" min="100" max="10000" step="100"/>
            <span class="form-hint">Higher = faster but more memory per batch</span>
          </div>
        </div>
      </div>

      <div class="form-actions">
        <button class="btn btn-primary" onclick="saveDbConfig()">
          <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/></svg>
          Save
        </button>
        <button class="btn btn-ghost" onclick="testDbConn()">
          <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2"><path d="M5 12.55a11 11 0 0 1 14.08 0"/><path d="M1.42 9a16 16 0 0 1 21.16 0"/><path d="M8.53 16.11a6 6 0 0 1 6.95 0"/><line x1="12" y1="20" x2="12.01" y2="20"/></svg>
          Test Connection
        </button>
      </div>
      <div class="alert hidden mt-3" id="db-save-result"></div>
      <div class="alert hidden mt-2" id="db-test-result"></div>

    </div>
  </div>

</section>
